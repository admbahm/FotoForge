name: Feature request
description: Propose an improvement to FotoForge
title: "[Feature]: "
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What archive-management problem should FotoForge solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety and reversibility
      description: How can the behavior remain deterministic, explainable, and reversible?
    validations:
      required: true
